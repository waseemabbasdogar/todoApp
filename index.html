<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="todo">
            <div class="theme">🌙</div>

            <h2>A Todo App <img src="/images//todo.png" alt="todo"></h2>

            <div class="task">
                <input type="text" placeholder="Enter task to add..." id="todoInput">
                <button onclick="addTask()">ADD</button>
            </div>

            <ul class="list"></ul>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
